<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renaud Bingo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .bingo-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 0 auto;
            width: fit-content;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #667eea;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: white;
            border-radius: 8px;
            transition: all 0.2s ease;
            color: #333;
        }

        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .cell.marked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #764ba2;
            font-weight: bold;
        }

        .free {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            font-weight: bold;
        }

        .free.marked {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
        }

        .print-container {
            display: none;
        }

        @media print {
            @page {
                margin: 0.5cm; /* Helps maximize page real estate */
            }

            body > *:not(.print-container) {
                display: none;
            }

            .print-container {
                display: block;
            }

            .boards-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr); /* Switched to 2 columns */
                grid-template-rows: repeat(3, 1fr);    /* Switched to 3 rows */
                gap: 20px;
                padding: 10px;
                height: 95vh; /* Spreads the 3 rows evenly down the page */
                align-content: space-evenly;
                page-break-after: always;
            }

            .boards-grid:last-child {
                page-break-after: auto;
            }

            .printable-board {
                page-break-inside: avoid;
                text-align: center;
            }

            .printable-board h3 {
                margin: 5px 0;
                font-size: 16px; /* Slightly larger title */
            }

            .printable-board .bingo-board {
                margin: 0 auto;
                width: 280px; /* Scaled up from 200px to better fit the paper width */
                gap: 4px;
                padding: 10px;
            }

            .printable-board .cell {
                width: 45px; /* Scaled up from 30px */
                height: 45px; /* Scaled up from 30px */
                font-size: 14px; /* Increased font for readability */
                border: 1px solid #667eea;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
                margin-bottom: 20px;
            }

            .cell {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }

            .button-group {
                gap: 10px;
                margin-bottom: 30px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Renaud Bingo</h1>
        <div id="bingo-container" class="bingo-board"></div>
        <div class="button-group">
            <button id="generate-board">Generate Board</button>
            <button id="print-boards">Print Boards</button>
        </div>
    </div>
    
    <div id="print-container" class="print-container">
        <div id="boards-grid-0" class="boards-grid"></div>
    </div>
    
    <script>
        let bingoNumbers = [];

        async function fetchBingoNumbers() {
            try {
                const response = await fetch('https://nzjnpazfkfbxooecyzeo.supabase.co/storage/v1/object/public/Cache/list.txt');
                const text = await response.text();
                bingoNumbers = text.split('\n').map(Number).filter(Boolean);
            } catch (error) {
                console.error("Failed to load numbers", error);
            }
        }

        function generateBoard() {
            if(bingoNumbers.length === 0) return [];
            const board = [];
            const selectedNumbers = new Set();

            while (board.length < 24) {
                const randomNum = bingoNumbers[Math.floor(Math.random() * bingoNumbers.length)];
                if (!selectedNumbers.has(randomNum)) {
                    board.push(randomNum);
                    selectedNumbers.add(randomNum);
                }
            }
            
            return board;
        }

        function displayBoard(board, containerId) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = '';
            
            if(board.length === 0) return;

            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (i === 12) {
                    cell.classList.add('free', 'marked');
                    cell.innerText = 'FREE';
                } else {
                    cell.innerText = board[i < 12 ? i : i - 1];
                }
                
                // Only allow clicking on the main interactive board, not printed ones
                if (containerId === 'bingo-container') {
                    cell.addEventListener('click', () => {
                        cell.classList.toggle('marked');
                    });
                }
                
                grid.appendChild(cell);
            }
        }

        function generateBingoBoard() {
            const board = generateBoard();
            displayBoard(board, 'bingo-container');
        }

        function printBoards() {
            if(bingoNumbers.length === 0) {
                alert("Please wait for numbers to load first.");
                return;
            }

            const count = prompt('How many bingo boards would you like to print?', '6');
            
            if (count === null || count === '') return;
            
            const numBoards = parseInt(count);
            if (isNaN(numBoards) || numBoards < 1) {
                alert('Please enter a valid number');
                return;
            }

            const printContainer = document.getElementById('print-container');
            printContainer.innerHTML = '';

            let boardCount = 0;
            let currentGrid = null;

            for (let i = 0; i < numBoards; i++) {
                // Create new grid every 6 boards (2 columns x 3 rows)
                if (boardCount % 6 === 0) {
                    currentGrid = document.createElement('div');
                    currentGrid.className = 'boards-grid';
                    printContainer.appendChild(currentGrid);
                }

                const board = generateBoard();
                
                const boardContainer = document.createElement('div');
                boardContainer.className = 'printable-board';
                
                const title = document.createElement('h3');
                title.innerText = `Renaud Bingo`;
                boardContainer.appendChild(title);
                
                const bingoGrid = document.createElement('div');
                bingoGrid.className = 'bingo-board';
                boardContainer.appendChild(bingoGrid);

                for (let j = 0; j < 25; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (j === 12) {
                        cell.classList.add('free');
                        cell.innerText = 'FREE';
                    } else {
                        cell.innerText = board[j < 12 ? j : j - 1];
                    }
                    bingoGrid.appendChild(cell);
                }

                currentGrid.appendChild(boardContainer);
                boardCount++;
            }

            setTimeout(() => window.print(), 100);
        }

        document.getElementById('generate-board').onclick = () => {
            generateBingoBoard();
        };

        document.getElementById('print-boards').onclick = () => {
            printBoards();
        };

        // Initialize with default prompt behavior fixed up
        fetchBingoNumbers().then(() => generateBingoBoard());
    </script>
</body>
</html>
